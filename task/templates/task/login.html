{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartPlan</title>
    <link rel="stylesheet" href="{% static 'task/css/login.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="brand">SmartPlan</div>
        <nav class="nav-links">
            <a href="{% url 'login' %}" class="active">Login</a>
            <a href="{% url 'register' %}">Register</a>
        </nav>
    </header>

    <main class="login-page">
        <div class="bg-shape cloud cloud-left"></div>
        <div class="bg-shape cloud cloud-right"></div>
        <div class="bg-shape star star-left"></div>
        <div class="bg-shape star star-mid"></div>
        <div class="bg-shape star star-right"></div>

        <section class="hero">
            <p class="page-tag">Welcome back</p>
            <h1 class="title-bubble">Login</h1>
            <p class="subtitle">Sign in to access your personal task dashboard.</p>

            <div class="login-card">
                <form method="post" class="auth-form" novalidate>
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="error-message">
                        Invalid username or password. Please try again.
                    </div>
                    {% endif %}

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            value="{{ form.username.value|default:'' }}"
                            placeholder="Enter your username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="button-row single-column">
                        <button type="submit" class="btn btn-primary">Login</button>
                        <a href="{% url 'register' %}" class="text-link">Don’t have an account? Create one</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
