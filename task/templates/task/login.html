{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartPlan</title>
    <link rel="stylesheet" href="{% static 'task/css/login.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="brand">SmartPlan</div>
        <nav class="nav-links">
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        </nav>
    </header>

    <main class="login-page">
        <div class="bg-shape cloud cloud-left"></div>
        <div class="bg-shape cloud cloud-right"></div>
        <div class="bg-shape star star-left"></div>
        <div class="bg-shape star star-mid"></div>
        <div class="bg-shape star star-right"></div>

        <section class="hero">
            <h1 class="title-bubble">Login</h1>
            <p class="subtitle">Sign in to access your personal task dashboard.</p>

            <div class="login-card">
                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="error-message">
                        Invalid username or password
                    </div>
                    {% endif %}

                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>

                    <div class="button-row">
                        <button type="submit" class="btn btn-primary">Login</button>
                        <a href="{% url 'register' %}" class="btn btn-secondary">Create account</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
