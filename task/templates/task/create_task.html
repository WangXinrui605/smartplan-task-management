<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Task - SmartPlan</title>
  <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
        background: linear-gradient(90deg, #fffafc 0%, #ffd9e6 100%);
        min-height: 100vh;
        color: #1f2430;
    }

    .page-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 34px 28px 56px;
    }

    h1 {
        margin: 0 0 28px;
        font-size: 64px;
        line-height: 1.05;
        font-weight: 900;
        color: #111827;
    }

    form {
        max-width: 980px;
    }

    .form-group,
    .mb-3 {
        margin-bottom: 18px;
    }

    label,
    .form-label {
        display: block;
        margin-bottom: 10px;
        font-size: 18px;
        font-weight: 800;
        color: #151b28;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1.5px solid #cfc7d5;
        background: rgba(255, 255, 255, 0.95);
        font-size: 16px;
        box-sizing: border-box;
        box-shadow:
            inset 0 2px 5px rgba(255,255,255,0.92),
            0 6px 14px rgba(166, 176, 201, 0.14);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
        outline: none;
        border-color: #f2a4bf;
        box-shadow:
            0 0 0 4px rgba(242, 164, 191, 0.18),
            0 8px 18px rgba(242, 164, 191, 0.12);
    }

    textarea {
        resize: vertical;
        min-height: 110px;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        padding: 12px 18px;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        text-decoration: none;
        font-size: 16px;
        font-weight: 800;
        color: white;
        background: linear-gradient(180deg, #58a4ff 0%, #2b61ef 100%);
        box-shadow:
            0 10px 18px rgba(46, 99, 239, 0.28),
            inset 0 2px 6px rgba(255,255,255,0.28);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:hover {
        transform: translateY(-1px);
    }

    .btn-cancel {
        background: linear-gradient(180deg, #ffffff 0%, #eef1f8 100%);
        color: #111827;
        margin-right: 12px;
        box-shadow: 0 8px 16px rgba(170, 180, 210, 0.18);
    }

    .error {
        margin-bottom: 18px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #fff1f2;
        border: 1px solid #fecdd3;
        color: #b42318;
    }

    .error ul {
        margin: 0;
        padding-left: 20px;
    }

    #priority-suggestion-result {
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: 16px;
        background: linear-gradient(180deg, #f8fbff 0%, #edf4ff 100%);
        border: 1px solid #d6e5ff;
        font-size: 15px;
        color: #21304a;
        box-shadow: 0 8px 16px rgba(140, 170, 220, 0.12);
        min-height: 26px;
    }

    .button-row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 18px;
    }

    @media (max-width: 768px) {
        .page-shell {
            padding: 22px 16px 40px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 22px;
        }

        .btn,
        .btn-cancel {
            width: 100%;
            margin-right: 0;
        }

        .button-row {
            flex-direction: column;
        }
    }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <div class="page-shell">
        <h1>Create Task</h1>
    {% if errors %}
        <div class="error">
            <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}  <!-- Django防跨站请求伪造（CSRF）保护 -->
        <div class="form-group">
            <label for="title">Task Title *</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="description">Task Description</label>
            <textarea id="description" name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="text" id="due_date" name="due_date" placeholder="Select a date">
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="">-- select category --</option>
                {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
        <div class="mb-3">
             <label for="note" class="form-label">Note</label>
             <textarea name="note" id="note" class="form-control" rows="4"
              placeholder="Write task plan, steps, or description here..."></textarea>
        </div>

 <!-- AI -->
        <div class="form-group">
            <button type="button" class="btn" id="suggest-priority-btn">AI Suggest Priority</button>
            <p id="priority-suggestion-result"></p>
        </div>
        
        <div class="button-row">
            <button type="button" class="btn btn-cancel" onclick="window.location.href='{% url 'task_dashboard' %}'">Cancel</button>
            <button type="submit" class="btn">Save</button>
        </div>
    </form>
<!-- AI JavaScript -->
<script>
function getCSRFToken() {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith('csrftoken=')) {
            return cookie.substring('csrftoken='.length);
        }
    }
    return '';
}

document.getElementById("suggest-priority-btn").addEventListener("click", async function () {
    const title = document.getElementById("title").value;
    const note = document.getElementById("note").value;
    const resultBox = document.getElementById("priority-suggestion-result");

    resultBox.textContent = "Generating suggestion...";

    try {
        const response = await fetch("{% url 'suggest_priority' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({
                title: title,
                note: note
            })
        });

        const data = await response.json();

        if (data.success) {
            document.getElementById("priority").value = data.priority.toLowerCase();
            resultBox.textContent = `Suggested priority: ${data.priority}. ${data.reason}`;
        } else {
            resultBox.textContent = "Failed to generate suggestion.";
        }
    } catch (error) {
        resultBox.textContent = "Error while generating suggestion.";
        console.error(error);
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("#due_date", {
        dateFormat: "Y-m-d",
        locale: "default",
        allowInput: true
    });
</script>
</div>
</body>
</html>
