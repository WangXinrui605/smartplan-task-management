<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartPlan{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
            background: linear-gradient(180deg, #fff8fb 0%, #fffdfd 100%);
            color: #222;
        }

        .page-wrapper {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 32px 40px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid #f3d6df;
            margin-bottom: 28px;
            box-shadow: 0 4px 16px rgba(241, 128, 160, 0.08);
        }

        .topbar-inner {
            max-width: 1500px;
            margin: 0 auto;
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .brand h1 {
            margin: 0;
            font-size: 26px;
            line-height: 1.1;
        }

        .brand p,
        .brand .welcome-text {
            margin: 4px 0 0;
            color: #444;
            font-size: 15px;
        }

        .nav-links {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #1d4ed8;
            font-weight: 500;
            font-size: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 18px;
            border-radius: 14px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(180deg, #58a4ff 0%, #2b61ef 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(50, 90, 230, 0.24);
        }

        .btn-secondary {
            background: linear-gradient(180deg, #ffffff 0%, #eef1f8 100%);
            color: #111827;
            box-shadow: 0 8px 16px rgba(170, 180, 210, 0.18);
        }

        .btn-danger {
            background: linear-gradient(180deg, #ff7180 0%, #eb2440 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(235, 36, 64, 0.24);
        }

        .task-completed td {
            background-color: #fcfcfd;
            color: #6b7280;
        }

        .task-completed td a {
            color: #6b7280;
        }

        .task-title-completed {
            text-decoration: line-through;
            color: #6b7280;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        .status-active {
            background: linear-gradient(180deg, #e4f0ff 0%, #bfdcff 100%);
            color: #1d4ed8;
        }

        .status-done {
            background: linear-gradient(180deg, #dcfce7 0%, #b8ebd0 100%);
            color: #166534;
        }

        .priority-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        .priority-high {
            background: linear-gradient(180deg, #fee2e2 0%, #ffcaca 100%);
            color: #b91c1c;
        }

        .priority-medium {
            background: linear-gradient(180deg, #fef3c7 0%, #f7df9d 100%);
            color: #b45309;
        }

        .priority-low {
            background: linear-gradient(180deg, #dcfce7 0%, #b8ebd0 100%);
            color: #166534;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.94);
            border-radius: 28px;
            padding: 28px;
            box-shadow:
                0 12px 26px rgba(238, 130, 167, 0.10),
                0 0 0 1px rgba(250, 220, 230, 0.75) inset;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h2 {
            margin: 0 0 10px;
            font-size: 34px;
            font-weight: 900;
        }

        .page-header p {
            margin: 0;
            color: #667085;
            font-size: 18px;
        }

        .task-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 18px;
            overflow: hidden;
            border-radius: 20px;
        }

        .task-table th,
        .task-table td {
            border: 1px solid #eadfe5;
            padding: 16px;
            text-align: left;
            vertical-align: middle;
        }

        .task-table th {
            background-color: #fffdfd;
            font-size: 16px;
            font-weight: 800;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: white;
            border: 1px solid #f0dbe3;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 6px 14px rgba(241, 128, 160, 0.08);
        }

        .stat-card h3 {
            margin: 0 0 8px;
            font-size: 16px;
            color: #6b7280;
        }

        .stat-card p {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        .form-card {
            background-color: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(241, 128, 160, 0.10);
            max-width: 820px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            box-sizing: border-box;
            border: 1px solid #d9d6de;
            border-radius: 12px;
            font-size: 15px;
            background: #fffdfd;
        }

        textarea {
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .error-box {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 18px;
        }

        .inline-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .section-title {
            margin: 30px 0 12px;
            font-size: 22px;
        }

        a:focus,
        button:focus,
        input:focus,
        select:focus,
        textarea:focus {
            outline: 3px solid #2563eb;
            outline-offset: 2px;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                padding: 0 16px 28px;
            }

            .topbar-inner {
                padding: 16px;
            }

            .page-header h2 {
                font-size: 28px;
            }

            .page-header p {
                font-size: 16px;
            }

            .content-card,
            .form-card {
                padding: 18px;
                border-radius: 20px;
            }

            .task-table th,
            .task-table td {
                padding: 12px;
                font-size: 14px;
            }
        }
</style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
          <div class="brand" style="display:flex; align-items:center; gap:14px;">
            <div style="
                width:54px;
                height:54px;
                border-radius:50%;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:28px;
                background:linear-gradient(180deg,#ffe88b,#ffc63d);
                box-shadow:0 6px 14px rgba(255,200,60,0.30);
            ">
                😊
            </div>

            <div>
                <h1 style="margin:0;">SmartPlan</h1>
                {% if user.is_authenticated %}
                    <div class="welcome-text">Welcome, {{ user.username }}!</div>
                {% endif %}
            </div>
        </div>

            <nav class="nav-links" aria-label="Main navigation">
                {% if user.is_authenticated %}
                    <a href="{% url 'task_dashboard' %}">Dashboard</a>
                    <a href="{% url 'stats_page' %}">Statistics</a>
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
                {% if user.is_superuser %}
                    <a href="/admin/" class="btn btn-secondary">Admin</a>
                {% endif %}
{#                <a href="{% url 'create_task' %}" class="btn btn-primary">+ Add Task</a>#}

            </nav>
        </div>
    </header>

    <main class="page-wrapper">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
